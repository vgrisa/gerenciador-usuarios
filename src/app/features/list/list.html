<div class="actions-container">
  <app-search-input [(search)]="search" />
  <div class="button-action">
    <a matButton="elevated" routerLink="/create">Criar usuario</a>
  </div>
</div>

@if (isLoading()) {
  <div>Loading...</div>
} @else {
  <app-users-list [users]="users()" (remove)="remove($event)" />
}
