<form [formGroup]="form" (ngSubmit)="submit()" class="form-container">

  <mat-form-field>
    <mat-label>Nome do Usuário</mat-label>
    <input
      matInput
      placeholder="Ex: Gabriel"
      required
      type="text"
      formControlName="name"
    />

    @if (form.controls.name.errors?.['required']) {
      <mat-error class="error-message">Campo obrigatorio</mat-error>
    }
  </mat-form-field>

  <div class="actions-container">
      <button type="button" matButton="elevated" routerLink="/">Cancelar</button>
      <button matButton="filled" [disabled]="form.invalid">Criar Usuario</button>
  </div>


</form>
